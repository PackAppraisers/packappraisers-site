<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pack Appraisers</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .logo {
      width: min(400px, 80vw);
      margin-bottom: 3rem;
      animation: fadeUp 0.9s ease both;
    }

    .card {
      background: #111;
      border: 1px solid #333;
      padding: 2.8rem 2.5rem;
      width: 100%;
      max-width: 480px;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    .card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: #fff;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .card p {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: #555;
      text-align: center;
      margin-bottom: 2.2rem;
      text-transform: uppercase;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1.1rem;
    }

    label {
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #fff;
    }

    input, textarea {
      background: #000;
      border: 1px solid #333;
      color: #fff;
      padding: 0.8rem 1rem;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input::placeholder, textarea::placeholder { color: #444; }

    input:focus, textarea:focus { border-color: #fff; }

    textarea { resize: vertical; min-height: 110px; }

    button {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.95rem;
      background: #fff;
      color: #000;
      border: none;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    button:hover { background: #000; color: #fff; border: 1px solid #fff; }

    button.sent { background: #222; color: #fff; cursor: default; border: 1px solid #333; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

  <div class="card">
    <h2>Get In Touch</h2>
    <p>Request a consultation</p>

    <form id="contactForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Jane Smith" required />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="jane@example.com" required />
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="(555) 000-0000" />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Tell us about your appraisal needs..." required></textarea>
      </div>
      <button type="submit" id="submitBtn">Send Message</button>
    </form>
  </div>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Message Sent ✓';
      btn.classList.add('sent');
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = 'Send Message';
        btn.classList.remove('sent');
        btn.disabled = false;
        this.reset();
      }, 3000);
    });
  </script>
